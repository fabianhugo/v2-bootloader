name: Build bootloader

on:
  workflow_dispatch:

# Reproducible build of the deployed bootloader. Verified byte-for-byte identical to
# the shipped image with this exact combination:
#   OS         : Ubuntu 20.04 "Focal"
#   compiler   : gcc-arm-none-eabi 15:9-2019-q4-0ubuntu1
#   micro-ecc  : commit b335ee812bfcca4cd3fb0e2a436aab39553a555a
#   nRF SDK    : v16 (sdk16 release asset)
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    env:
      DEBIAN_FRONTEND: noninteractive
      MICRO_ECC_COMMIT: b335ee812bfcca4cd3fb0e2a436aab39553a555a
      # Committed reference image to check reproducibility against.
      # Leave the file absent to skip the check.
      REFERENCE_O: bootloader_original.o

    steps:
      - name: Ensure Ubuntu has basic tools
        run: |
          set -eux
          apt-get update -qq
          apt-get install -y software-properties-common
          apt-get install -y build-essential
          apt-get install -y git
          apt-get install -y curl
          apt-get install -y unzip

      - name: Install GCC ARM compiler
        run: |
          set -eux
          apt-get install -y gcc-arm-none-eabi=15:9-2019-q4-0ubuntu1
          arm-none-eabi-gcc --version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch nRF SDK v16
        run: |
          set -eux
          # Public release asset, no auth required.
          # https://github.com/microbit-foundation/v2-bootloader/releases/tag/sdk16
          curl -fL \
               "https://github.com/microbit-foundation/v2-bootloader/releases/download/sdk16/nRF5SDK.zip" \
               -o nrf.zip
          # Sanity-check: make sure we actually got a zip, not an HTML/JSON error body.
          if ! unzip -tq nrf.zip > /dev/null 2>&1; then
            echo "::error::Downloaded nrf.zip is not a valid zip archive. Contents:"
            head -c 500 nrf.zip
            exit 1
          fi
          unzip -q nrf.zip

      - name: Configure nRF SDK toolchain path
        run: |
          set -eux
          rm nRF5SDK/components/toolchain/gcc/Makefile.posix
          printf 'GNU_INSTALL_ROOT ?= \r\nGNU_VERSION ?= 7.3.1\r\nGNU_PREFIX ?= arm-none-eabi\r\n' \
            > nRF5SDK/components/toolchain/gcc/Makefile.posix

      - name: Build micro-ecc
        run: |
          set -eux
          git clone https://github.com/kmackay/micro-ecc nRF5SDK/external/micro-ecc/micro-ecc
          # Pin micro-ecc to a fixed commit for reproducibility.
          git -C nRF5SDK/external/micro-ecc/micro-ecc checkout "$MICRO_ECC_COMMIT"
          git -C nRF5SDK/external/micro-ecc/micro-ecc rev-parse HEAD
          make -C nRF5SDK/external/micro-ecc/nrf52hf_armgcc/armgcc

      - name: Build bootloader
        run: |
          set -eux
          make -C bootloader/microbit/armgcc bob

      - name: Collect artifact
        run: |
          set -eux
          mkdir -p artifacts
          cp bootloader/microbit/armgcc/bootloader_s113.o artifacts/bootloader.o

      - name: Verify reproducibility against reference
        run: |
          set -eu
          if [ ! -f "$REFERENCE_O" ]; then
            echo "::warning::Reference $REFERENCE_O not found — skipping reproducibility check."
            exit 0
          fi
          # Compare the raw firmware image (the .bootloader section), not the ELF wrapper.
          arm-none-eabi-objcopy -O binary --only-section=.bootloader artifacts/bootloader.o built.bin
          arm-none-eabi-objcopy -O binary --only-section=.bootloader "$REFERENCE_O"      ref.bin
          if cmp -s built.bin ref.bin; then
            echo "Reproducibility check passed: build matches $REFERENCE_O byte-for-byte."
          else
            echo "::error::Build differs from $REFERENCE_O ($(cmp -l built.bin ref.bin | wc -l) bytes)."
            cmp -l built.bin ref.bin | head
            exit 1
          fi

      - name: Upload artifact
        # Always upload — even if the reproducibility check failed — so a mismatching
        # build can still be downloaded and inspected.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootloader
          path: artifacts/bootloader.o
